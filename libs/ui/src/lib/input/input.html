<div class="flex flex-col gap-1.5">
  @if (label()) {
    <label
      [for]="id()"
      class="text-sm font-medium text-gray-700 dark:text-gray-300"
    >
      {{ label() }}
    </label>
  }
  <input
    [id]="id()"
    [type]="type()"
    [placeholder]="placeholder()"
    [disabled]="isDisabled()"
    [value]="value()"
    [class]="inputClasses()"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />
  @if (errorMessage()) {
    <span class="text-xs text-red-500">{{ errorMessage() }}</span>
  } @else if (hint()) {
    <span class="text-xs text-gray-400">{{ hint() }}</span>
  }
</div>
