<fieldset class="flex flex-col gap-1.5" [disabled]="isDisabled()">
  @if (label()) {
    <legend class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
      {{ label() }}
    </legend>
  }

  <div class="flex flex-col gap-2">
    @for (option of options(); track option.value; let i = $index) {
      <label
        [for]="optionIds()[i]"
        class="flex items-start gap-2.5 cursor-pointer"
        [class.opacity-50]="isDisabled() || option.disabled"
        [class.cursor-not-allowed]="isDisabled() || option.disabled"
      >
        <input
          type="radio"
          [id]="optionIds()[i]"
          [name]="name()"
          [value]="option.value"
          [checked]="isSelected(option.value)"
          [disabled]="isDisabled() || option.disabled"
          (change)="select(option.value)"
          class="mt-0.5 h-4 w-4 shrink-0 accent-black border-gray-300
                 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-black
                 disabled:cursor-not-allowed"
        />
        <span class="flex flex-col">
          <span class="text-sm text-gray-700 dark:text-gray-300 select-none">{{ option.label }}</span>
          @if (option.hint) {
            <span class="text-xs text-gray-400">{{ option.hint }}</span>
          }
        </span>
      </label>
    }
  </div>

  @if (errorMessage()) {
    <span class="text-xs text-red-500 mt-1">{{ errorMessage() }}</span>
  } @else if (hint()) {
    <span class="text-xs text-gray-400 mt-1">{{ hint() }}</span>
  }
</fieldset>
